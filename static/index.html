<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Sementic Analysis Tool</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Newsreader:opsz,wght@6..72,500;6..72,600&family=Sora:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="brand">
        <h1>Sementic Analysis Tool</h1>
        <span class="version">v0.00001</span>
      </div>
      <span id="api-status" class="status" role="status" hidden></span>
    </header>

    <main class="page">
      <section class="block input-block">
        <form id="analyze-form">
          <textarea
            id="text-input"
            rows="14"
            placeholder="Paste your text here"
            spellcheck="false"
          ></textarea>

          <div class="toolbar">
            <label class="file-label">
              <input type="file" id="file-input" accept=".txt,.md,text/plain" />
              File
            </label>
            <span id="file-name" class="file-name"></span>
            <label class="freq">
              Min. frequency
              <input type="number" id="min-freq" value="2" min="1" max="10" />
            </label>
            <button type="submit" id="submit-btn" class="btn">Analyze</button>
          </div>
        </form>
        <p id="error-msg" class="error" hidden></p>
      </section>

      <section id="results" class="block results" data-accent="cooccurrence" hidden>
        <p class="meta">
          <span id="stat-sentences">—</span> sentences ·
          <span id="stat-vocab">—</span> concepts
        </p>

        <details class="fold">
          <summary>Concepts</summary>
          <p class="fold-label">English translation</p>
          <div id="english-by-sentence" class="concept-lines muted-lines"></div>
          <p class="fold-label">Concept codes</p>
          <div id="concepts-by-sentence" class="concept-lines"></div>
          <table class="data-table" id="freq-table">
            <thead>
              <tr><th>Concept</th><th>n</th></tr>
            </thead>
            <tbody></tbody>
          </table>
        </details>

        <div class="tabs" role="tablist">
          <button type="button" class="tab on" data-tab="cooccurrence">Co-occurrence</button>
          <button type="button" class="tab" data-tab="semantic">Semantic</button>
          <button type="button" class="tab" data-tab="epistemic">Epistemic</button>
        </div>

        <div id="method-note" class="method-note" aria-live="polite"></div>

        <div class="output-head">
          <span id="graph-stats" class="hint"></span>
          <div class="output-actions">
            <button type="button" id="download-graph-btn" class="btn-text" disabled>
              Download graph
            </button>
            <button type="button" id="download-btn" class="btn-text" disabled>
              Download XLSX
            </button>
          </div>
        </div>

        <div id="graph-network" class="graph" aria-label="Network graph"></div>
        <div class="matrix-scroll" id="matrix-table-wrap"></div>
      </section>
    </main>

    <div id="loading" class="loading" hidden aria-live="polite">Working…</div>

    <script
      src="https://unpkg.com/vis-network/standalone/umd/vis-network.min.js"
      crossorigin="anonymous"
    ></script>
    <script src="/static/app.js" type="module"></script>
  </body>
</html>
